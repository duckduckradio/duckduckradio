<!DOCTYPE html>

<meta name="theme-color" content="#ffd000">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
background-image:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("duck-duck.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:Arial, sans-serif;
text-align:center;
padding:10px;
}

.center-column{
width:100%;
max-width:600px;
margin:0 auto;
display:flex;
flex-direction:column;
align-items:center;
background:rgba(0,0,0,0.35);
border-radius:20px;
padding:20px 16px 24px 16px;
}

.linkbtn{
display:inline-block;
padding:12px 18px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
border:none;
cursor:pointer;
font-size:15px;
min-width:220px;
margin-bottom:20px;
}

.linkbtn:hover{
background:#ffb700;
}

.page-title{
font-size:40px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
}

.page-subtitle{
color:white;
font-size:18px;
margin-bottom:20px;
}

.interview-list{
width:100%;
text-align:left;
background:rgba(0,0,0,0.30);
border-radius:16px;
padding:18px;
}

.interview-list a{
display:block;
color:#ffd000;
text-decoration:none;
font-size:17px;
font-weight:bold;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.interview-list a:last-child{
border-bottom:none;
}

.interview-list a:hover{
color:white;
}
</style>
</head>

<body>

<div class="center-column">

  <!-- BACK BUTTON -->
  <a href="index.html" class="linkbtn">← Back</a>
