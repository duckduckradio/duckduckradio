<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("duck-duck.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
box-sizing:border-box;
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:90%;
width:500px;
box-sizing:border-box;
}

.logo{
font-size:56px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
line-height:1.1;
}

.tagline{
color:white;
margin-bottom:18px;
font-size:20px;
}

.livewrap{
margin-bottom:18px;
}

.livebadge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
}

.livebadge.on{
background:#d60000;
box-shadow:0 0 12px rgba(214,0,0,0.7);
}

.nowplaying{
margin-bottom:24px;
color:white;
font-size:16px;
line-height:1.4;
min-height:44px;
}

.nowplaying strong{
display:block;
font-size:14px;
color:#ffd000;
margin-bottom:4px;
}

.songtitle{
font-size:18px;
font-weight:bold;
}

.playbutton{
width:120px;
height:120px;
border-radius:60px;
background:#1DB954;
border:none;
font-size:50px;
color:white;
cursor:pointer;
}

.playbutton:hover{
background:#1ed760;
}

.links{
margin-top:25px;
}

.linkbtn{
display:inline-block;
margin:8px;
padding:10px 20px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.linkbtn:hover{
background:#ffb700;
}

audio{
display:none;
}

@media (max-width: 600px){
.box{
padding:25px;
width:100%;
}

.logo{
font-size:38px;
}

.tagline{
font-size:17px;
margin-bottom:16px;
}

.nowplaying{
font-size:15px;
}

.songtitle{
font-size:16px;
}

.playbutton{
width:95px;
height:95px;
border-radius:50%;
font-size:38px;
}
}
</style>
</head>

<body>

<div class="box">

<div class="logo">Duck Duck Radio</div>
<div class="tagline">Broadcasting from Stilbaai</div>

<div class="livewrap">
  <span id="livebadge" class="livebadge">OFF AIR</span>
</div>

<div class="nowplaying">
  <strong>Now Playing</strong>
  <div id="songtitle" class="songtitle">Loading song info...</div>
</div>

<button id="playbtn" class="playbutton" onclick="playRadio()">▶</button>

<div class="links">
  <a href="https://www.facebook.com/profile.php?id=61588258871807" target="_blank" class="linkbtn">Facebook</a>
  <a href="https://wa.me/27825541599" target="_blank" class="linkbtn">Request a Song</a>
</div>

<audio id="radio"></audio>

</div>

<script>
var radio = document.getElementById("radio");
var streamUrl = "https://sv2.famcast.co.za/stream/duckduck-radio";
var isPlaying = false;
var btn = document.getElementById("playbtn");
var livebadge = document.getElementById("livebadge");
var songtitle = document.getElementById("songtitle");
var refreshTimer = null;

function setLiveState(on){
  if (on){
    livebadge.textContent = "LIVE";
    livebadge.classList.add("on");
    btn.innerHTML = "❚❚";
  } else {
    livebadge.textContent = "OFF AIR";
    livebadge.classList.remove("on");
    btn.innerHTML = "▶";
  }
}

function playRadio(){
  if (!isPlaying){
    radio.src = streamUrl;
    radio.play();
    isPlaying = true;
    setLiveState(true);
    getNowPlaying();
    refreshTimer = setInterval(getNowPlaying, 15000);
  } else {
    radio.pause();
    radio.removeAttribute("src");
    radio.load();
    isPlaying = false;
    setLiveState(false);
    if (refreshTimer){
      clearInterval(refreshTimer);
      refreshTimer = null;
    }
  }
}

async function getNowPlaying(){
  try {
    const response = await fetch("https://sv2.famcast.co.za/public/duckduck-radio");
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const text = doc.body.innerText.replace(/\s+/g, " ").trim();

    const match = text.match(/Track History\s+1\.\s+(.*?)\s+2\.\s+/i);

    if (match && match[1]) {
      songtitle.textContent = match[1].trim();
    } else {
      songtitle.textContent = "Live stream is playing";
    }
  } catch (error) {
    songtitle.textContent = "Now playing info unavailable";
  }
}

getNowPlaying();
</script>

</body>
</html>
