<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="duck_radio_icon_180.png">
<link rel="icon" href="duck_radio_icon_192.png">
<meta name="theme-color" content="#ffd000">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
background-image:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("duck-duck.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:Arial, sans-serif;
text-align:center;
padding:10px;
}

.page-wrap{
width:100%;
max-width:1100px;
margin:0 auto;
display:flex;
justify-content:center;
align-items:flex-start;
gap:10px;
}

.ads-column{
width:90px;
display:flex;
flex-direction:column;
gap:10px;
flex-shrink:0;
}

.ad-box{
width:90px;
height:90px;
background:rgba(255,255,255,0.92);
border-radius:6px;
overflow:hidden;
display:block;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
transition:transform 0.2s ease, box-shadow 0.2s ease;
}

.ad-box:hover{
transform:scale(1.05);
box-shadow:0 6px 16px rgba(0,0,0,0.5);
}

.ad-box img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.center-wrap{
flex:1;
display:flex;
justify-content:center;
}

.center-column{
width:100%;
max-width:360px;
min-height:890px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.35);
border-radius:20px;
padding:14px 0 14px 0;
}

.top-menu{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
padding:0 18px;
}

.box{
width:100%;
max-width:360px;
padding:24px 18px;
border-radius:20px;
box-sizing:border-box;
background:transparent;
}

.logo{
font-size:42px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
line-height:1.1;
}

.tagline{
color:white;
margin-bottom:16px;
font-size:18px;
}

.livewrap{
margin-bottom:16px;
}

.livebadge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
}

.livebadge.on{
background:#d60000;
box-shadow:0 0 12px rgba(214,0,0,0.7);
}

.nowplaying{
margin-bottom:20px;
color:white;
font-size:15px;
line-height:1.4;
min-height:44px;
background:rgba(0,0,0,0.3);
padding:12px;
border-radius:10px;
}

.nowplaying strong{
display:block;
font-size:14px;
color:#ffd000;
margin-bottom:4px;
}

.songtitle{
font-size:16px;
font-weight:bold;
}

.playbutton{
width:95px;
height:95px;
border-radius:50%;
background:linear-gradient(145deg, #1DB954, #17a74a);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
border:none;
font-size:38px;
color:white;
cursor:pointer;
transition:all 0.2s ease;
}

.playbutton:hover{
transform:scale(1.05);
background:linear-gradient(145deg, #22d060, #18b150);
}

.playbutton:active{
transform:scale(0.95);
}

.playbutton.playing{
box-shadow:0 0 25px rgba(29,185,84,0.8), 0 8px 20px rgba(0,0,0,0.4);
background:linear-gradient(145deg, #22d060, #18b150);
}

.volume-wrap{
margin-top:16px;
color:white;
}

.volume-label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:white;
}

#volumeSlider{
width:100%;
max-width:220px;
cursor:pointer;
}

.links{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.linkbtn{
display:inline-block;
padding:12px 18px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
border:none;
cursor:pointer;
font-size:15px;
min-width:230px;
}

.linkbtn:hover{
background:#ffb700;
}

audio{
display:none;
}

/* MOBILE FIX INCLUDED HERE */
@media (max-width: 700px){

.page-wrap{
gap:6px;
}

.ads-column{
width:72px;
gap:8px;
}

/* THIS IS THE FIX */
.ads-column:first-child{
margin-left:10px;
}

.ads-column:last-child{
margin-right:10px;
}

.ad-box{
width:72px;
height:72px;
}

.center-column{
max-width:300px;
min-height:712px;
padding:12px 0 12px 0;
}

.box{
max-width:300px;
padding:20px 14px;
}

.top-menu{
padding:0 14px;
}

.logo{
font-size:34px;
}

.tagline{
font-size:16px;
}

.linkbtn{
min-width:200px;
font-size:14px;
padding:11px 16px;
}

}
</style>
</head>
