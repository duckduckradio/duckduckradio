<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4");
background-size:cover;
background-position:center;
font-family:Arial, sans-serif;
text-align:center;
}

.box{
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.logo{
font-size:56px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
text-transform:uppercase;
letter-spacing:2px;
}

.tagline{
color:white;
font-size:20px;
margin-bottom:25px;
}

audio{
width:320px;
max-width:90%;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo">Duck Duck Radio</div>
  <div class="tagline">Broadcasting from Stilbaai</div>

  <audio controls autoplay>
    <source src="https://sv2.famcast.co.za/stream/duckduck-radio" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</div>

</body>
</html>
