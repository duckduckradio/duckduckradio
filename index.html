<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("duck-duck.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
box-sizing:border-box;
.volume-wrap{
margin-top:20px;
color:white;
}

.volume-label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
}

#volumeSlider{
width:220px;
max-width:90%;
cursor:pointer;
}  
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:90%;
width:500px;
box-sizing:border-box;
}

.logo{
font-size:56px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
line-height:1.1;
}

.tagline{
color:white;
margin-bottom:18px;
font-size:20px;
}

.livewrap{
margin-bottom:18px;
}

.livebadge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
}

.livebadge.on{
background:#d60000;
box-shadow:0 0 12px rgba(214,0,0,0.7);
}

.nowplaying{
margin-bottom:24px;
color:white;
font-size:16px;
line-height:1.4;
min-height:44px;
}

.nowplaying strong{
display:block;
font-size:14px;
color:#ffd000;
margin-bottom:4px;
}

.songtitle{
font-size:18px;
font-weight:bold;
}

.playbutton{
width:120px;
height:120px;
border-radius:60px;
background:#1DB954;
border:none;
font-size:50px;
color:white;
cursor:pointer;
}

.playbutton:hover{
background:#1ed760;
}

.links{
margin-top:25px;
}

.linkbtn{
display:inline-block;
margin:8px;
padding:10px 20px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.linkbtn:hover{
background:#ffb700;
}

audio{
display:none;
}

@media (max-width: 600px){
.box{
padding:25px;
width:100%;
}

.logo{
font-size:38px;
}

.tagline{
font-size:17px;
margin-bottom:16px;
}

.nowplaying{
font-size:15px;
}

.songtitle{
font-size:16px;
}

.playbutton{
width:95px;
height:95px;
border-radius:50%;
font-size:38px;
}
}
</style>
</head>

<body>

<div class="box">

<div class="logo">Duck Duck Radio</div>
<div class="tagline">Broadcasting from Stilbaai</div>

<div class="livewrap">
  <span id="livebadge" class="livebadge">OFF AIR</span>
</div>

<div class="nowplaying">
  <strong>Now Playing</strong>
  <div id="songtitle" class="songtitle">Loading song info...</div>
</div>

<button id="playbtn" class="playbutton" onclick="playRadio()">▶</button>
<div class="volume-wrap">
  <label for="volumeSlider" class="volume-label">Volume</label>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
</div>
  
<div class="links">
  <a href="https://www.facebook.com/profile.php?id=61588258871807" target="_blank" class="linkbtn">Facebook</a>
  <a href="https://wa.me/27825541599" target="_blank" class="linkbtn">Request a Song</a>
  <button onclick="shareStation()" class="linkbtn">Share This Station</button>
</div>

<audio id="radio"></audio>

</div>

<script>
var radio = document.getElementById("radio");
var streamUrl = "https://sv2.famcast.co.za/stream/duckduck-radio";
var isPlaying = false;
var btn = document.getElementById("playbtn");
var livebadge = document.getElementById("livebadge");
var songtitle = document.getElementById("songtitle");

function playRadio(){
  if (!isPlaying){
    radio.src = streamUrl;
    radio.play();
    btn.innerHTML = "❚❚";
    livebadge.innerHTML = "LIVE";
    livebadge.classList.add("on");
    isPlaying = true;
  } else {
    radio.pause();
    radio.removeAttribute("src");
    radio.load();
    btn.innerHTML = "▶";
    livebadge.innerHTML = "OFF AIR";
    livebadge.classList.remove("on");
    isPlaying = false;
  }
}

async function updateSong(){
  try{
    const response = await fetch("https://sv2.famcast.co.za/json/stream/duckduck-radio");
    const data = await response.json();

    if (data.nowplaying){
      songtitle.innerText = data.nowplaying;
    } else {
      songtitle.innerText = "Live stream";
    }

  } catch(e){
    songtitle.innerText = "Now playing unavailable";
  }
}

updateSong();
setInterval(updateSong, 15000);

function setVolume(value){
radio.volume = value;
}
async function shareStation(){
  const shareData = {
    title: "Duck Duck Radio",
    text: "Listen live to Duck Duck Radio",
    url: "https://duckduckradio.github.io/duckduckradio"
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch (err) {
    }
  } else {
    try {
      await navigator.clipboard.writeText(shareData.url);
      alert("Station link copied to clipboard");
    } catch (err) {
      alert("Copy this link: " + shareData.url);
    }
  }
}
 
</script>

</body>
</html>
