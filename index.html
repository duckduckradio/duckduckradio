<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("duck-duck.jpg");
background-size:cover;
background-position:center;
font-family:Arial, sans-serif;
text-align:center;
}

.box{
background:rgba(0,0,0,0.55);
padding:40px;
border-radius:20px;
}

.logo{
font-size:56px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
}

.tagline{
color:white;
margin-bottom:30px;
font-size:20px;
}

.playbutton{
width:120px;
height:120px;
border-radius:60px;
background:#1DB954;
border:none;
font-size:50px;
color:white;
cursor:pointer;
}

.playbutton:hover{
background:#1ed760;
}

audio{
display:none;
}

</style>

</head>

<body>

<div class="box">

<div class="logo">Duck Duck Radio</div>
<div class="tagline">Broadcasting from Stilbaai</div>

<button class="playbutton" onclick="playRadio()">▶ ❚❚</button>

<audio id="radio">
<source src="https://sv2.famcast.co.za/stream/duckduck-radio" type="audio/mpeg">
</audio>

</div>

<script>

function playRadio(){
var radio = document.getElementById("radio");
radio.src = "https://sv2.famcast.co.za/stream/duckduck-radio";

function playRadio(){

if (radio.paused){
radio.play();
}else{
radio.pause();
}

}
document.getElementById("radio").play();
}

</script>

</body>
</html>
