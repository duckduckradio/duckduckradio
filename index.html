<!DOCTYPE html>
<html>
<head>
<title>Duck Duck Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="duck_radio_icon_180.png">
<link rel="icon" href="duck_radio_icon_192.png">
<meta name="theme-color" content="#ffd000">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
background-image:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("duck-duck.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
font-family:Arial, sans-serif;
text-align:center;
padding:10px;
}

.page-wrap{
width:100%;
max-width:1100px;
margin:0 auto;
display:flex;
justify-content:center;
align-items:flex-start;
gap:10px;
}

.ads-column{
width:90px;
display:flex;
flex-direction:column;
gap:10px;
flex-shrink:0;
}

.ad-box{
width:90px;
height:90px;
background:rgba(255,255,255,0.92);
border-radius:6px;
overflow:hidden;
display:block;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.ad-box img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.center-wrap{
flex:1;
display:flex;
justify-content:center;
}

.box{
background:rgba(0,0,0,0.35);
padding:24px 18px;
border-radius:20px;
width:100%;
max-width:360px;
box-sizing:border-box;
}

.logo{
font-size:42px;
font-weight:bold;
color:#ffd000;
margin-bottom:10px;
line-height:1.1;
}

.tagline{
color:white;
margin-bottom:16px;
font-size:18px;
}

.livewrap{
margin-bottom:16px;
}

.livebadge{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,0.15);
color:white;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
}

.livebadge.on{
background:#d60000;
box-shadow:0 0 12px rgba(214,0,0,0.7);
}

.nowplaying{
margin-bottom:20px;
color:white;
font-size:15px;
line-height:1.4;
min-height:44px;
background:rgba(0,0,0,0.3);
padding:12px;
border-radius:10px;
}

.nowplaying strong{
display:block;
font-size:14px;
color:#ffd000;
margin-bottom:4px;
}

.songtitle{
font-size:16px;
font-weight:bold;
}

.playbutton{
width:95px;
height:95px;
border-radius:50%;
background:linear-gradient(145deg, #1DB954, #17a74a);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
border:none;
font-size:38px;
color:white;
cursor:pointer;
transition:all 0.2s ease;
}

.playbutton:hover{
transform:scale(1.05);
background:linear-gradient(145deg, #22d060, #18b150);
}

.playbutton:active{
transform:scale(0.95);
}

.playbutton.playing{
box-shadow:0 0 25px rgba(29,185,84,0.8), 0 8px 20px rgba(0,0,0,0.4);
background:linear-gradient(145deg, #22d060, #18b150);
}

.volume-wrap{
margin-top:16px;
color:white;
}

.volume-label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:white;
}

#volumeSlider{
width:100%;
max-width:220px;
cursor:pointer;
}

.links{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.linkbtn{
display:inline-block;
padding:12px 18px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
border:none;
cursor:pointer;
font-size:15px;
min-width:230px;
}

.linkbtn:hover{
background:#ffb700;
}

audio{
display:none;
}

@media (max-width: 700px){
.page-wrap{
gap:6px;
}

.ads-column{
width:72px;
gap:8px;
}

.ad-box{
width:72px;
height:72px;
}

.box{
max-width:300px;
padding:20px 14px;
}

.logo{
font-size:34px;
}

.tagline{
font-size:16px;
}

.linkbtn{
min-width:200px;
font-size:14px;
padding:11px 16px;
}
}
</style>
</head>

<body>

<div class="page-wrap">

  <div class="ads-column">
    <a href="#" class="ad-box"><img src="Privelistea.jpg" alt="Advert 1"></a>
    <a href="#" class="ad-box"><img src="CarCareClinic.jpg" alt="Advert 2"></a>
    <a href="#" class="ad-box"><img src="Spar.jpeg" alt="Advert 3"></a>
    <a href="#" class="ad-box"><img src="ad4.jpg" alt="Advert 4"></a>
    <a href="#" class="ad-box"><img src="ad5.jpg" alt="Advert 5"></a>
    <a href="#" class="ad-box"><img src="ad6.jpg" alt="Advert 6"></a>
  </div>

  <div class="center-wrap">
    <div class="box">

      <div class="logo">Duck Duck Radio</div>
      <div class="tagline">The Sound of Stilbaai</div>

      <div class="livewrap">
        <span id="livebadge" class="livebadge">OFF AIR</span>
      </div>

      <div class="nowplaying">
        <strong>Now Playing</strong>
        <div id="songtitle" class="songtitle">Loading song info...</div>
      </div>

      <button id="playbtn" class="playbutton" onclick="playRadio()">▶</button>

      <div class="volume-wrap">
        <label for="volumeSlider" class="volume-label">Volume</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" oninput="setVolume(this.value)">
      </div>

      <div class="links">
        <a href="https://www.facebook.com/profile.php?id=61588258871807" target="_blank" class="linkbtn">Facebook</a>
        <a href="https://wa.me/27825541599" target="_blank" class="linkbtn">Request a Song</a>
        <button onclick="shareStation()" class="linkbtn">Share This Station</button>
        <button onclick="addToHomeScreen()" class="linkbtn">📱 Add to Home Screen</button>
      </div>

      <audio id="radio"></audio>

    </div>
  </div>

  <div class="ads-column">
    <a href="#" class="ad-box"><img src="ad7.jpg" alt="Advert 7"></a>
    <a href="#" class="ad-box"><img src="ad8.jpg" alt="Advert 8"></a>
    <a href="#" class="ad-box"><img src="ad9.jpg" alt="Advert 9"></a>
    <a href="#" class="ad-box"><img src="ad10.jpg" alt="Advert 10"></a>
    <a href="#" class="ad-box"><img src="ad11.jpg" alt="Advert 11"></a>
    <a href="#" class="ad-box"><img src="ad12.jpg" alt="Advert 12"></a>
  </div>

</div>

<script>
var radio = document.getElementById("radio");
radio.volume = 0.7;

var streamUrl = "https://sv2.famcast.co.za/stream/duckduck-radio";
var isPlaying = false;
var btn = document.getElementById("playbtn");
var livebadge = document.getElementById("livebadge");
var songtitle = document.getElementById("songtitle");

radio.addEventListener("error", reconnectStream);
radio.addEventListener("stalled", reconnectStream);
radio.addEventListener("ended", reconnectStream);

function reconnectStream(){
  if (isPlaying){
    setTimeout(function(){
      radio.src = streamUrl + "?t=" + new Date().getTime();
      radio.load();
      radio.play().catch(function(){});
    }, 3000);
  }
}

function playRadio(){
  if (!isPlaying){
    radio.src = streamUrl;
    radio.play();
    btn.innerHTML = "❚❚";
    btn.classList.add("playing");
    livebadge.innerHTML = "LIVE";
    livebadge.classList.add("on");
    isPlaying = true;
  } else {
    radio.pause();
    radio.removeAttribute("src");
    radio.load();
    btn.innerHTML = "▶";
    btn.classList.remove("playing");
    livebadge.innerHTML = "OFF AIR";
    livebadge.classList.remove("on");
    isPlaying = false;
  }
}

async function updateSong(){
  try{
    const response = await fetch("https://sv2.famcast.co.za/json/stream/duckduck-radio");
    const data = await response.json();

    if (data.nowplaying){
      songtitle.innerText = data.nowplaying;
    } else {
      songtitle.innerText = "Live stream";
    }

  } catch(e){
    songtitle.innerText = "Now playing unavailable";
  }
}

updateSong();
setInterval(updateSong, 15000);

function setVolume(value){
  radio.volume = value;
}

async function shareStation(){
  const shareData = {
    title: "Duck Duck Radio",
    text: "Listen live to Duck Duck Radio",
    url: "https://duckduckradio.github.io/duckduckradio"
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch (err) {}
  } else {
    try {
      await navigator.clipboard.writeText(shareData.url);
      alert("Station link copied to clipboard");
    } catch (err) {
      alert("Copy this link: " + shareData.url);
    }
  }
}

function addToHomeScreen(){
  var ua = navigator.userAgent.toLowerCase();

  if (/iphone|ipad|ipod/.test(ua)) {
    alert("On iPhone: open this site in Safari, tap Share, then tap Add to Home Screen.");
  } else if (/android/.test(ua)) {
    alert("On Android: tap your browser menu, then choose Add to Home screen.");
  } else {
    alert("Use your browser menu and select Add to Home Screen.");
  }
}
</script>

</body>
</html>
