<!DOCTYPE html>
<html>
<head>
<title>Order Received - Duck Duck Radio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
text-align:center;
padding:60px 20px;
}

h1{
color:#ffd000;
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
line-height:1.6;
max-width:560px;
margin:0 auto 20px auto;
}

.order-number{
color:#ffd000;
font-size:22px;
font-weight:bold;
margin:20px 0;
}

a{
display:inline-block;
margin-top:20px;
padding:14px 28px;
background:#ffd000;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
}

a:hover{
background:#ffb700;
}
</style>
</head>

<body>

<h1>Order Received 🎧</h1>

<p>Your order has been received.</p>

<div class="order-number" id="orderNumberBox"></div>

<p>
We will confirm stock and send you an invoice with payment details to your email shortly.
</p>

<a href="https://duckduckradio.github.io/duckduckradio/">Return to Duck Duck Radio</a>

<script>
const params = new URLSearchParams(window.location.search);
const order = params.get("order");

if(order){
document.getElementById("orderNumberBox").innerText = "Order Number: " + order;
}
else{
document.getElementById("orderNumberBox").innerText = "Order Number: Not available";
}
</script>

</body>
</html>
